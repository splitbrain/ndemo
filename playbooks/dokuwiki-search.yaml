app:
  url: https://www.dokuwiki.org
  viewport: { width: 1280, height: 720 }
  scale: 1
  zoom: 1
  setup:
    - run: echo "ndemo setup started at $(date)" > /tmp/ndemo-test.log
    - run: cp playbooks/dokuwiki-search.yaml /tmp/ndemo-test-playbook.yaml
    - type: click
      target: { role: button, name: "Yes, I'm a real person." }
      if: { visible: "h1:has-text('Are you Human?')" }

segments:
  - id: intro-pause
    intent: "Brief pause to show the landing page."
    actions:
      - type: wait
        duration: 2000

  - id: search
    narration: "We open DokuWiki and search for agent."
    intent: "Type 'agent' into the search box and submit the search."
    actions:
      - type: click
        target: { placeholder: Search }
      - type: type
        target: { placeholder: Search }
        text: agent
      - type: press
        key: Enter
        done:
          url: "**do=search**"
