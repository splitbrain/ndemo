app:
  url: https://www.dokuwiki.org
  viewport: { width: 1280, height: 720 }
  scale: 1
  zoom: 1
  setup:
    - type: click
      target: { role: button, name: "Yes, I'm a real person." }
      if: { visible: "h1:has-text('Are you Human?')" }

segments:
  - id: search
    narration: "We open DokuWiki and search for agent."
    intent: "Type 'agent' into the search box and submit the search."
    actions:
      - type: click
        target: { placeholder: Search }
      - type: type
        target: { placeholder: Search }
        text: agent
      - type: press
        key: Enter
        done:
          url: "**do=search**"
